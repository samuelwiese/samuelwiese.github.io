<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samuel Wiese | Infraestrutura e Tecnologia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --hover-color: #0ea5e9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Avatar */
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--accent-color);
            margin-bottom: 20px;
            object-fit: cover;
        }

        header {
            text-align: center;
            max-width: 400px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.8rem;
            margin: 10px 0;
        }

        p {
            font-size: 1rem;
            color: #94a3b8;
            line-height: 1.5;
        }

        /* Container de Links */
        .links-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background-color: var(--card-bg);
            color: var(--text-color);
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .link-card:hover {
            border-color: var(--accent-color);
            background-color: #334155;
            transform: translateY(-2px);
        }

        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #64748b;
        }

        /* Icones */
        i { font-size: 1.2rem; }
    </style>
</head>
<body>

    <img src="https://github.com/samuelwiese.png" alt="Samuel Wiese" class="profile-pic">

    <header>
        <h1>Samuel Wiese</h1>
        <p>Redes e Infraestrutura. Segurança e soluções escaláveis.</p>
    </header>

    <div class="links-container">
        <a href="https://wa.me/5547996988299" class="link-card" target="_blank">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>

        <a href="https://www.linkedin.com/in/wiesesamuel/" class="link-card" target="_blank">
            <i class="fab fa-linkedin"></i> LinkedIn
        </a>

        <a href="https://github.com/samuelwiese" class="link-card" target="_blank">
            <i class="fab fa-github"></i> Meus Projetos (GitHub)
        </a>

        <a href="mailto:samuelwiese@outlook.com" class="link-card">
            <i class="fas fa-envelope"></i> E-mail
        </a>
    </div>

    <footer>
        &copy; 2026 Samuel Wiese
    </footer>

</body>
</html>
